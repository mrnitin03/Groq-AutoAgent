name: DigitalNagari-MultiAgent

on:
  schedule:
    - cron: "0 */12 * * *" # Har 12 ghante mein
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Multi-Agent Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAPH_TOKEN: ${{ secrets.TELEGRAPH_TOKEN }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: python bot.py

      - name: Commit All Changes (HTML & Logs)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: publish new articles [skip ci]"
            git push
          fi
