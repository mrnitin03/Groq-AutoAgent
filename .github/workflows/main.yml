name: DigitalNagari-Groq-AutoAgent

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAPH_TOKEN: ${{ secrets.TELEGRAPH_TOKEN }}
        run: python bot.py

      - name: Commit Verification Pack
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f verification_pack.txt ]; then
            git add verification_pack.txt
            git commit -m "chore: update verification logs [skip ci]" || echo "No changes"
            git push
          else
            echo "verification_pack.txt not found. Skipping commit."
          fi
