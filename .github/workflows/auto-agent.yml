name: DigitalNagari-Groq-AutoAgent

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAPH_TOKEN: ${{ secrets.TELEGRAPH_TOKEN }}
        run: python bot.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add verification_pack.txt
          git commit -m "Update verification logs [skip ci]" || echo "No changes to commit"
          git push
import os
import json
import requests
import time
from datetime import datetime

# Configuration
GROQ_API_KEY = os.getenv("GROQ_API_KEY")
TELEGRAPH_TOKEN = os.getenv("TELEGRAPH_TOKEN")
MODEL = "llama3-70b-8192"

def get_seo_content():
    url = "https://api.groq.com/openai/v1/chat/completions"
    headers = {
        "Authorization": f"Bearer {GROQ_API_KEY}",
        "Content-Type": "application/json"
    }
    
    prompt = (
        "Write a high-quality SEO article about 'The Future of AI Automation in 2024'. "
        "Format the response strictly as a JSON object with two keys: 'title' and 'paragraphs'. "
        "'paragraphs' should be a list of strings. Do not include any other text."
    )
    
    payload = {
        "model": MODEL,
        "messages": [{"role": "user", "content": prompt}],
        "response_format": {"type": "json_object"}
    }
    
    try:
        response = requests.post(url, headers=headers, json=payload, timeout=30)
        response.raise_for_status()
        data = response.json()
        return json.loads(data['choices'][0]['message']['content'])
    except Exception as e:
        print(f"Error calling Groq: {e}")
        return None

def publish_to_telegraph(title, paragraphs):
    url = "https://api.telegra.ph/createPage"
    
    content = []
    for p in paragraphs:
        content.append({"tag": "p", "children": [p]})
    
    payload = {
        "access_token": TELEGRAPH_TOKEN,
        "title": title,
        "author_name": "DigitalNagari AI",
        "content": json.dumps(content),
        "return_content": True
    }
    
    try:
        response = requests.post(url, data=payload, timeout=20)
        response.raise_for_status()
        return response.json().get("result", {}).get("url")
    except Exception as e:
        print(f"Error publishing to Telegraph: {e}")
        return None

def index_now(article_url):
    url = "https://api.indexnow.org/indexnow"
    payload = {
        "host": "telegra.ph",
        "key": "b6a32d1e9e7c4f5a8d2c1e9b7a3d2e1c", # Example Key
        "keyLocation": f"{article_url}",
        "urlList": [article_url]
    }
    try:
        requests.post(url, json=payload, timeout=10)
    except:
        pass

def main():
    if not GROQ_API_KEY or not TELEGRAPH_TOKEN:
        print("Missing Environment Variables.")
        return

    print("Generating content...")
    article = get_seo_content()
    
    if article and 'title' in article and 'paragraphs' in article:
        print(f"Publishing: {article['title']}")
        url = publish_to_telegraph(article['title'], article['paragraphs'])
        
        if url:
            print(f"Success! URL: {url}")
            index_now(url)
            
            with open("verification_pack.txt", "a") as f:
                timestamp = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
                f.write(f"[{timestamp}] URL: {url} | Title: {article['title']}\n")
        else:
            print("Failed to publish.")
    else:
        print("Failed to generate valid content.")

if __name__ == "__main__":
    main()
import requests
import json

def generate_telegraph_token():
    url = "https://api.telegra.ph/createAccount"
    params = {
        "short_name": "DigitalNagari",
        "author_name": "AI Agent"
    }
    
    try:
        response = requests.get(url, params=params)
        data = response.json()
        if data.get("ok"):
            token = data["result"]["access_token"]
            with open("telegraph_token.txt", "w") as f:
                f.write(token)
            print(f"Token generated and saved to telegraph_token.txt: {token}")
        else:
            print(f"Error: {data.get('error')}")
    except Exception as e:
        print(f"Request failed: {e}")

if __name__ == "__main__":
    generate_telegraph_token()
requests
